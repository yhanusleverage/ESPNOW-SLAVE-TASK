; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_port = COM3
upload_port = COM3
upload_speed = 115200
upload_resetmethod = hard_reset

; 🔌 ESP-NOW SLAVE - Receptor con Hardware de Relés
; Recibe comandos del MASTER via ESP-NOW
; Hardware: ESP32 + PCF8574 (0x20) + Módulo 8 relés

; Configuração de partição para mais espaço de código
board_build.partitions = huge_app.csv
board_build.filesystem = spiffs

lib_deps =
	; JSON para comunicação ESP-NOW
	bblanchon/ArduinoJson @ ^6.21.5
	
	; 🔌 PCF8574 - Expansor I/O I2C para controlar 8 relés
	; SLAVE precisa desta biblioteca para controlar hardware de relés
	robtillaart/PCF8574 @ ^0.3.9
	
	; Bibliotecas ESP32 essenciais
	WiFi
	Preferences

; Configurações de build para ESP-NOW
build_flags = 
	-D CORE_DEBUG_LEVEL=3
	-D CONFIG_ARDUHAL_LOG_DEFAULT_LEVEL=3
	;ardhual_log_default_level=3 é um volume para mensagens de DEBUG sistematico

	;[I] WiFi: Connecting to network...
	;[I] ESP-NOW: Peer added successfully
	;[I] Relay: Command received
	;[W] WiFi: Signal weak
	;[E] WiFi: Connection failed
	
	; 🔧 Configurações ESP-NOW
	-D ESPNOW_CHANNEL=1
	-D MAX_ESPNOW_PEERS=10
	
	; 🔌 MODO SLAVE - Receptor com hardware de relés físicos
	; Recebe e executa comandos do MASTER via ESP-NOW
	; Hardware: PCF8574 (0x20) + 8 relés + SafetyWatchdog
	-D SLAVE_MODE
	
; Configurações de monitor
monitor_filters = 
	esp32_exception_decoder
